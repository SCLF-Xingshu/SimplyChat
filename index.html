<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simply Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="chat-container">
    <h1>Simply Chat</h1>
    <div id="messages"></div>
      <input type="text" id="username" placeholder="Username" />
      <button id="github-login">Login with GitHub</button>
    <div id="input-container">
      <input type="text" id="message" placeholder="Message" maxlength="1000" />
      <button id="send">Send</button>
    </div>
    <div id="char-count">0 / 1000</div>
  </div>

  <script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://koprmimlvjziuznbntzc.supabase.co'
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvcHJtaW1sdmp6aXV6bmJudHpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDI2NjYsImV4cCI6MjA4NjY3ODY2Nn0.hPp-Fx6o7LtBSW_YIuw7WtJd73z8l1KLbg-O5UbPWeU'
const supabase = createClient(supabaseUrl, supabaseKey)

const messagesDiv = document.getElementById('messages')
const usernameInput = document.getElementById('username')
const messageInput = document.getElementById('message')
const charCount = document.getElementById('char-count')
const sendBtn = document.getElementById('send')

// Live character counter
messageInput.addEventListener('input', () => {
  charCount.textContent = `${messageInput.value.length} / 1000`
})

// Add a message to chat with [ DD.MM.YYYY - HH:MM - TZ ] timestamp
function addMessage(msg) {
  const div = document.createElement('div')

  const date = new Date(msg.created_at)
  const day = String(date.getDate()).padStart(2, '0')
  const month = String(date.getMonth() + 1).padStart(2, '0')
  const year = date.getFullYear()
  const hours = String(date.getHours()).padStart(2, '0')
  const minutes = String(date.getMinutes()).padStart(2, '0')
  const tzParts = date.toLocaleTimeString(undefined, { timeZoneName: 'short' }).split(' ')
  const tz = tzParts[tzParts.length - 1] || ''

  // Use two lines
  div.innerHTML = `[${day}/${month}/${year} ${hours}:${minutes} ${tz}]<br>${msg.username}: ${msg.content}`
  
  messagesDiv.appendChild(div)
  messagesDiv.scrollTop = messagesDiv.scrollHeight
}

// Load existing messages
async function loadMessages() {
  const { data: messages, error } = await supabase
    .from('simplychat_messages')
    .select('*')
    .order('created_at', { ascending: true })
  
  if (error) {
    console.error('Error loading messages:', error)
  } else {
    messages.forEach(addMessage)
  }
}

loadMessages()

// Real-time listener
const chatChannel = supabase
  .channel('public:simplychat_messages')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'simplychat_messages' }, payload => {
    addMessage(payload.new)
  })
  .subscribe()

// Send a message
sendBtn.addEventListener('click', async () => {
  const username = usernameInput.value.trim() || 'Anonymous'
  const content = messageInput.value.trim()
  if (!content) return
  if (content.length > 1000) {
    alert('Your message exceeds 1000 characters')
    return
  }
  const { error } = await supabase.from('simplychat_messages').insert([{ username, content }])

  if (error) {
    console.error('Error inserting message:', error)
  } else {
    messageInput.value = ''
    charCount.textContent = '0 / 1000'
  }
})

// Optional: press Enter to send
// messageInput.addEventListener('keydown', (e) => {
//   if (e.key === 'Enter') sendBtn.click()
// })
</script>
</body>
</html>
