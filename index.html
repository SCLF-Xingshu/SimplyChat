<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simply Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="chat-container">
    <h1>Simply Chat</h1>
    <div id="messages"></div>
      <input type="text" id="username" placeholder="Username" />
      <button id="github-login">Login with GitHub</button>
    <div id="input-container">
      <input type="text" id="message" placeholder="Message" maxlength="1000" />
      <button id="send">Send</button>
    </div>
    <div id="char-count">0 / 1000</div>
  </div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// Supabase setup
const supabaseUrl = 'https://koprmimlvjziuznbntzc.supabase.co'
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvcHJtaW1sdmp6aXV6bmJudHpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDI2NjYsImV4cCI6MjA4NjY3ODY2Nn0.hPp-Fx6o7LtBSW_YIuw7WtJd73z8l1KLbg-O5UbPWeU'
const supabase = createClient(supabaseUrl, supabaseKey)

// DOM elements
const messagesDiv = document.getElementById('messages')
const usernameInput = document.getElementById('username')
const messageInput = document.getElementById('message')
const charCount = document.getElementById('char-count')
const sendBtn = document.getElementById('send')
const githubLoginBtn = document.getElementById('github-login')

let currentUser = null

// Character counter
messageInput.addEventListener('input', () => { 
  charCount.textContent = `${messageInput.value.length} / 1000`
})

// Add message
function addMessage(msg) {
  const div = document.createElement('div')
  const date = new Date(msg.created_at)
  const day = String(date.getDate()).padStart(2,'0')
  const month = String(date.getMonth() + 1).padStart(2,'0')
  const year = date.getFullYear()
  const hours = String(date.getHours()).padStart(2,'0')
  const minutes = String(date.getMinutes()).padStart(2,'0')
  const tzParts = date.toLocaleTimeString(undefined, { timeZoneName: 'short' }).split(' ')
  const tz = tzParts[tzParts.length - 1] || ''
  
  div.innerHTML = `[${day}/${month}/${year} ${hours}:${minutes} ${tz}]<br>${msg.username}: ${msg.content}`
  
  messagesDiv.appendChild(div)
  messagesDiv.scrollTop = messagesDiv.scrollHeight
}

// Load existing messages
async function loadMessages() {
  const { data: messages, error } = await supabase
    .from('simplychat_messages')
    .select('*')
    .order('created_at', { ascending: true })
  
  if (error) {
    console.error('Error loading messages:', error)
  } else {
    messages.forEach(addMessage)
  }
}

loadMessages()

// Real-time listener
const chatChannel = supabase
  .channel('public:simplychat_messages')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'simplychat_messages' }, payload => {
    addMessage(payload.new)
  })
  .subscribe()

// Send message
sendBtn.addEventListener('click', async () => {
  let username = 'Anonymous'

  if (currentUser) { 
    username = `[GH] ${currentUser.user_metadata.user_name}` 
  } else {
    username = usernameInput.value.trim() || 'Anonymous'
  }
  
  const content = messageInput.value.trim()
  if (!content) return
  if (content.length > 1000) {
    alert('Your message exceeds 1000 characters')
    return
  }

  const { error } = await supabase.from('simplychat_messages').insert([{ username, content }])
  if (error) {
    console.error('Error inserting message:', error)
  } else {
    messageInput.value = ''
    charCount.textContent = '0 / 1000'
  }
})

// GitHub login
githubLoginBtn.addEventListener('click', async () => {
  await supabase.auth.signInWithOAuth({ provider: 'github' })
})

// Check user session after redirect
async function checkUser() {
  const { data: { session } } = await supabase.auth.getSession()

  currentUser = session?.user || null

  if (currentUser) {
    const githubUsername = currentUser.user_metadata.user_name
    usernameInput.value = `[GH] ${githubUsername}`
    usernameInput.disabled = true
  }

  // Clean URL if hash exists
  if (window.location.hash) {
    history.replaceState(null, '', window.location.pathname)
  }
}

checkUser()

// Listen for auth changes
supabase.auth.onAuthStateChange((_event, session) => {
  if (session) {
    currentUser = session.user
    const githubUsername = currentUser.user_metadata.user_name
    usernameInput.value = `[GH] ${githubUsername}`
    usernameInput.disabled = true
  }
})

// Optional: press Enter to send
// messageInput.addEventListener('keydown', (e) => {
//   if (e.key === 'Enter') sendBtn.click()
// })
</script>
</body>
</html>
