<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simply Chat</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f7f7f7; }
    h1 { text-align: center; color: #333; }
    #chat-container { max-width: 600px; margin: 0 auto; }
    #messages { border: 1px solid #ccc; border-radius: 5px; background: #fff; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
    #messages div { margin-bottom: 8px; }
    #input-container { display: flex; gap: 5px; }
    input[type="text"] { flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
    #send { padding: 8px 15px; border-radius: 4px; border: none; background: #007bff; color: #fff; cursor: pointer; }
    #send:hover { background: #0056b3; }
    #char-count { text-align: right; font-size: 12px; color: #666; margin-top: 2px; }
  </style>
</head>
<body>
  <div id="chat-container">
    <h1>Simply Chat</h1>
    <div id="messages"></div>
    <div id="input-container">
      <input type="text" id="username" placeholder="Username" />
      <input type="text" id="message" placeholder="Message" maxlength="1000" />
      <button id="send">Send</button>
    </div>
    <div id="char-count">0 / 1000</div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // Replace with your Supabase project details
    const supabaseUrl = 'https://koprmimlvjziuznbntzc.supabase.co'
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvcHJtaW1sdmp6aXV6bmJudHpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDI2NjYsImV4cCI6MjA4NjY3ODY2Nn0.hPp-Fx6o7LtBSW_YIuw7WtJd73z8l1KLbg-O5UbPWeU'
    const supabase = createClient(supabaseUrl, supabaseKey)

    const messagesDiv = document.getElementById('messages')
    const usernameInput = document.getElementById('username')
    const messageInput = document.getElementById('message')
    const charCount = document.getElementById('char-count')
    const sendBtn = document.getElementById('send')

    // Live character counter
    messageInput.addEventListener('input', () => {
      charCount.textContent = `${messageInput.value.length} / 1000`
    })

    // Add a message to chat
    function addMessage(msg) {
      const div = document.createElement('div')
      const time = new Date(msg.created_at).toLocaleTimeString()
      div.textContent = `[${time}] ${msg.username}: ${msg.content}`
      messagesDiv.appendChild(div)
      messagesDiv.scrollTop = messagesDiv.scrollHeight // Scroll to bottom
    }

    // Load existing messages
    async function loadMessages() {
      const { data: messages, error } = await supabase
        .from('simplychat_messages')
        .select('*')
        .order('created_at', { ascending: true })
      
      if (error) {
        console.error('Error loading messages:', error)
      } else {
        messages.forEach(addMessage)
      }
    }

    loadMessages()

    // Real-time listener
    supabase
      .channel('public:simplychat_messages')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'simplychat_messages' }, payload => {
        // Add the new message immediately to the chat
        addMessage(payload.new)
      })
      .subscribe()

    // Send a message
    sendBtn.addEventListener('click', async () => {
      const username = usernameInput.value.trim() || 'Anonymous'
      const content = messageInput.value.trim()
      if (!content) return
      if (content.length > 1000) {
        alert('Your message exceeds 1000 characters')
        return
      }
      const { error } = await supabase.from('simplychat_messages').insert([{ username, content }])

      if (error) {
        console.error('Error inserting message:', error)
      } else {
        messageInput.value = ''
        charCount.textContent = '0 / 1000'
      }
    })

    // press Enter to send (inactive)
    // messageInput.addEventListener('keydown', (e) => {
    //  if (e.key === 'Enter') sendBtn.click()
    // })
  </script>
</body>
</html>
